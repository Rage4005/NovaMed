<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMind — AI Chat Assistant</title>
  <meta name="description" content="A sleek AI chatbot powered by Hugging Face Inference API. Chat with state-of-the-art language models instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background ambient blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Header -->
  <header class="header" role="banner">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" stroke="url(#lg)" stroke-width="2"/>
            <path d="M9 14 L14 9 L19 14 L14 19 Z" fill="url(#lg2)"/>
            <circle cx="14" cy="14" r="3" fill="white"/>
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
              <linearGradient id="lg2" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-name">NovaMind</span>
        <span class="logo-badge">AI</span>
      </div>
      <div class="header-controls">
        <div id="status-dot" class="status-dot" title="Checking connection…"></div>
        <span id="status-text" class="status-text">Connecting…</span>
        <button id="clear-btn" class="icon-btn" title="Clear conversation" aria-label="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main chat area -->
  <main class="chat-main" role="main">
    <div id="messages" class="messages" aria-live="polite" aria-label="Chat messages">
      <!-- Welcome message -->
      <div class="welcome">
        <div class="welcome-icon" aria-hidden="true">✨</div>
        <h1 class="welcome-title">Hello! I'm NovaMind</h1>
        <p class="welcome-subtitle">Your AI-powered assistant, ready to help with anything. Ask me a question, brainstorm ideas, or just say hi!</p>
        <div class="suggestion-chips">
          <button class="chip" data-msg="Explain quantum computing in simple terms">💡 Explain quantum computing</button>
          <button class="chip" data-msg="Write a short poem about the ocean">🌊 Write a poem about the ocean</button>
          <button class="chip" data-msg="Give me 5 tips for staying productive">📋 Productivity tips</button>
          <button class="chip" data-msg="What is the latest in AI research?">🤖 Latest AI trends</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Input bar -->
  <footer class="input-bar" role="contentinfo">
    <div class="input-wrapper">
      <div class="input-container">
        <textarea
          id="user-input"
          class="user-input"
          placeholder="Message NovaMind…"
          rows="1"
          maxlength="4000"
          aria-label="Type your message"
        ></textarea>
        <button id="send-btn" class="send-btn" aria-label="Send message" title="Send (Enter)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Powered by <strong>Groq</strong> · Llama 3.3 70B · Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
